---
- name: EKS Node Hardening Playbook
  hosts: eks_nodes
  become: true
  vars:
    ssh_port: 22
    max_auth_tries: 3

  tasks:

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: restart sshd

    - name: Set max SSH authentication tries
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^MaxAuthTries'
        line: 'MaxAuthTries {{ max_auth_tries }}'
        state: present
      notify: restart sshd

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: restart sshd

    - name: Set file descriptor limits
      pam_limits:
        domain: '*'
        limit_type: hard
        limit_item: nofile
        value: 65536

    - name: Enable auditd service
      systemd:
        name: auditd
        enabled: true
        state: started

    - name: Add audit rules for privileged commands
      lineinfile:
        path: /etc/audit/rules.d/hardening.rules
        line: "{{ item }}"
        create: true
      loop:
        - '-a always,exit -F arch=b64 -S execve -k exec_commands'
        - '-w /etc/passwd -p wa -k identity'
        - '-w /etc/sudoers -p wa -k sudoers'

    - name: Disable unused kernel modules
      kernel_module:
        name: "{{ item }}"
        state: absent
      loop:
        - usb-storage
        - cramfs
        - freevxfs

    - name: Set sysctl hardening parameters
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { key: 'net.ipv4.tcp_syncookies', value: '1' }
        - { key: 'kernel.randomize_va_space', value: '2' }

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted