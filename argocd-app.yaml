apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vivek1251/eks-gitops-platform
    targetRevision: HEAD
    path: helm/eks-gitops-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true